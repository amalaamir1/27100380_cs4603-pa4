name: PA4 CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install project and development dependencies
        run: uv sync --locked --extra dev

      - name: Run Ruff
        run: uv run ruff check agent/ client/

  test:
    name: Offline graph smoke test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install project and development dependencies
        run: uv sync --locked --extra dev

      - name: Run required offline smoke test
        run: uv run pytest -q tests/test_smoke.py

  deploy:
    name: Register and deploy to Databricks
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      # Pipeline authentication: configure these as GitHub Actions secrets.
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      # PA4 resource configuration. These are identifiers, not credentials.
      DATABRICKS_MODEL: databricks-meta-llama-3-3-70b-instruct
      EMBEDDINGS_ENDPOINT: databricks-gte-large-en
      UC_CATALOG: cs4603
      UC_SCHEMA: default
      UC_MODEL_NAME: s27100380_document_analyst
      VECTOR_SEARCH_ENDPOINT: s27100380-vs-endpoint
      VECTOR_SEARCH_INDEX: cs4603.default.s27100380_analyst_index
      SERVING_ENDPOINT_NAME: s27100380-document-analyst
      SECRET_SCOPE: cs4603-deploy

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install project dependencies
        run: uv sync --locked

      - name: Log, register, and deploy the model
        run: uv run python deployment/deploy.py

      - name: Print deployed version and endpoint status
        run: |
          uv run python -c "import os; from databricks.sdk import WorkspaceClient; endpoint = WorkspaceClient().serving_endpoints.get(os.environ['SERVING_ENDPOINT_NAME']); entity = endpoint.config.served_entities[0]; print(f'Deployed model version: {entity.entity_version}'); print(f'Endpoint status: {endpoint.state.ready}')"